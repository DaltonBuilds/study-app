[tools]
python = "3.13.11"
uv = "latest"
"pipx:commitizen-tools/commitizen" = "latest"
"pipx:pre-commit/pre-commit" = "latest"
gh = "latest"
vim = "latest"
ruff = "latest"

[settings]
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[settings.python]
uv_venv_auto = "create|source"

[env]
APP_REPO = 'study-app'
GITOPS_REPO = 'study-app-gitops'

