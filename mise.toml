[tools]
python = "3.13"
uv = "latest"
"pipx:commitizen-tools/commitizen" = "latest"
pre-commit = "latest"
gh = "latest"
vim = "latest"
ruff = "latest"

[settings]
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[settings.python]
uv_venv_auto = "create|source"

[env]
APP_REPO = 'study-app'
GITOPS_REPO = 'study-app-gitops'

[hooks]
enter = "bash ./scripts/setup_project"
